name: Publish miniapp

# Thin caller — the real build+publish lives in the reusable publish.yml, so a
# fix there reaches every miniapp at once (no per-repo update). See publish.yml.

on:
  push:
    branches: [main]
    tags: ["v*"]
  # Lets Backstage's "Deploy" button trigger a build+publish on demand.
  workflow_dispatch:

jobs:
  publish:
    uses: DentVega/miniapp-template/.github/workflows/publish.yml@main
    secrets: inherit
